<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elegg Retro CRT</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="desk">
      <section class="crt-shell" aria-label="Retro CRT terminal">
        <div class="screen-wrap">
          <canvas id="crtCanvas" width="512" height="256"></canvas>
          <div class="glass"></div>
          <div id="fpsCounter" class="fps-counter" aria-live="off">FPS:0</div>
        </div>
      </section>
    </main>
  </body>
</html>
